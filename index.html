<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIGHTS OF DEER CHAPTER 1 | RETAPED</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

/* MENU */
#menu {
 position:absolute; width:100%; height:100%;
 display:flex; flex-direction:column;
 justify-content:center; align-items:center;
}
button {
 padding:15px; margin:10px;
 background:red; color:white; border:none;
}

/* PANEL */
.panel {
 position:absolute; width:100%; height:100%;
 display:none; justify-content:center; align-items:center;
 flex-direction:column;
}

/* GAME */
#game { display:none; }

/* ENTITY */
.entity { width:20px; height:20px; position:absolute; }
#player { background:red; }
#deer { background:white; }
#key { background:yellow; }
#door { background:blue; }

/* WALL */
.wall { position:absolute; background:#333; }

/* UI */
#dialog {
 position:absolute; bottom:0;
 width:100%;
 background:rgba(0,0,0,0.7);
 padding:10px;
}

/* BUTTON */
.btn {
 position:absolute; right:10px;
 background:red; padding:10px;
 touch-action: manipulation;
}
#run { bottom:140px; }
#crouch { bottom:90px; }
#flash { bottom:40px; }

/* JOYSTICK */
#joyBase {
 position:absolute; bottom:30px; left:30px;
 width:100px; height:100px;
 border:2px solid red; border-radius:50%;
 touch-action:none;
}
#joyStick {
 width:50px; height:50px;
 background:red; border-radius:50%;
 position:absolute; left:25px; top:25px;
}

/* DARKNESS */
#darkness {
 position:absolute;
 width:100%; height:100%;
 pointer-events:none;
 background:black;
}

/* BAR */
.bar { width:150px; height:10px; border:1px solid white; }
.fill { height:100%; width:0%; background:lime; }

/* ENDING */
#ending {
 position:absolute;
 width:100%; height:100%;
 background:black;
 color:white;
 display:none;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 opacity:0;
 transition:2s;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
<h1>NIGHTS OF DEER</h1>
<h3>CHAPTER 1 | RETAPED</h3>
<button onclick="openPanel('start')">PLAY</button>
</div>

<!-- START -->
<div id="start" class="panel">
<h2>SPAM UNTIL READY</h2>
<div class="bar"><div id="startFill" class="fill"></div></div>

<br>
<button onclick="skipStart()">SKIP</button>
</div>

<!-- GAME -->
<div id="game">

<div id="player" class="entity"></div>
<div id="deer" class="entity"></div>
<div id="key" class="entity"></div>
<div id="door" class="entity"></div>

<div id="darkness"></div>

<div id="run" class="btn">RUN</div>
<div id="crouch" class="btn">CROUCH</div>
<div id="flash" class="btn">🔦</div>

<div id="joyBase"><div id="joyStick"></div></div>

<div style="position:absolute;top:10px;">
VOICE<div class="bar"><div id="voiceBar" class="fill"></div></div>
BATTERY<div class="bar"><div id="batteryBar" class="fill"></div></div>
</div>

<div id="dialog">YOU: find the key...</div>

</div>

<!-- ENDING -->
<div id="ending">
<h2 id="endingText">...</h2>
<p id="endingSub"></p>
<br>
<button onclick="backToMenu()">BACK TO MENU</button>
</div>

<script>
// PANEL
function openPanel(id){
 menu.style.display="none";
 document.getElementById(id).style.display="flex";
}

// SKIP
function skipStart(){
 fill = 100;
 startFill.style.width = "100%";
 setTimeout(()=>{
   start.style.display="none";
   game.style.display="block";
 },200);
}

// BACK MENU
function backToMenu(){
 location.reload();
}

// START BAR
let fill=0;
document.addEventListener("click",()=>{
 if(start.style.display==="flex") fill+=5;
});
setInterval(()=>{
 if(start.style.display!=="flex") return;
 fill-=1;
 fill=Math.max(0,Math.min(100,fill));
 startFill.style.width=fill+"%";
 if(fill>=100){
   start.style.display="none";
   game.style.display="block";
 }
},100);

// PLAYER
let x=50,y=50;
let sprint=false,crouch=false;

run.onclick=(e)=>{ e.stopPropagation(); sprint=!sprint; }
crouch.onclick=(e)=>{ e.stopPropagation(); crouch=!crouch; }

// FLASH
let flash=false, battery=100;
flash.onclick=(e)=>{ e.stopPropagation(); flash=!flash; }

// JOYSTICK
let joyX=0, joyY=0;
joyBase.ontouchmove=e=>{
 let r=joyBase.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+50);
 let dy=t.clientY-(r.top+50);
 let d=Math.min(40,Math.sqrt(dx*dx+dy*dy));
 let a=Math.atan2(dy,dx);
 joyX=Math.cos(a)*(d/40);
 joyY=Math.sin(a)*(d/40);
 joyStick.style.left=(25+joyX*25)+"px";
 joyStick.style.top=(25+joyY*25)+"px";
};
joyBase.ontouchend=()=>{ joyX=0; joyY=0; };

// MAZE
let walls=[];
function wall(x,y,w,h){
 let d=document.createElement("div");
 d.className="wall";
 d.style.left=x+"px";
 d.style.top=y+"px";
 d.style.width=w+"px";
 d.style.height=h+"px";
 game.appendChild(d);
 walls.push({x,y,w,h});
}
wall(0,100,300,20);
wall(200,200,20,200);

// COLLISION
function collide(nx,ny){
 for(let w of walls){
  if(nx<w.x+w.w && nx+20>w.x && ny<w.y+w.h && ny+20>w.y){
   return true;
  }
 }
 return false;
}

// OBJECT
let keyX=250,keyY=50;
let doorX=350,doorY=350;
let hasKey=false;

// AI
let deerX=300,deerY=300;
let voiceLevel=0;

// MIC
navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
 let ctx=new AudioContext();
 let mic=ctx.createMediaStreamSource(s);
 let a=ctx.createAnalyser();
 mic.connect(a);
 let data=new Uint8Array(a.frequencyBinCount);
 function loop(){
  a.getByteFrequencyData(data);
  let sum=0;
  for(let i of data) sum+=i;
  voiceLevel=sum/data.length;
  voiceBar.style.width=Math.min(100,voiceLevel)+"%";
  requestAnimationFrame(loop);
 }
 loop();
});

// ENDING
function triggerEnding(){
 game.style.display="none";
 ending.style.display="flex";
 setTimeout(()=> ending.style.opacity=1,50);

 setTimeout(()=> endingText.innerText="YOU ESCAPED...",1000);
 setTimeout(()=> endingSub.innerText="But the deer is still watching...",3000);
 setTimeout(()=> endingSub.innerText="CHAPTER 1 COMPLETE",5000);
}

// UPDATE
function update(){
 let speed=2;
 if(sprint) speed=4;
 if(crouch) speed=1;

 let nx=x, ny=y;
 nx+=joyX*speed*2;
 ny+=joyY*speed*2;

 if(!collide(nx,ny)){ x=nx; y=ny; }

 // DARKNESS
 if(flash){
   battery-=0.2;
   darkness.style.background=`radial-gradient(circle at ${x}px ${y}px, transparent 80px, black 200px)`;
 } else {
   battery+=0.1;
   darkness.style.background="black";
 }

 battery=Math.max(0,Math.min(100,battery));
 batteryBar.style.width=battery+"%";

 if(battery<=0) flash=false;

 // KEY
 if(Math.hypot(x-keyX,y-keyY)<20 && !hasKey){
  hasKey=true;
  key.style.display="none";
 }

 // DOOR
 if(Math.hypot(x-doorX,y-doorY)<20 && hasKey){
  triggerEnding();
 }

 // AI
 let dx=x-deerX, dy=y-deerY;
 if(voiceLevel>40){
  deerX+=dx*0.03;
  deerY+=dy*0.03;
 }

 if(Math.hypot(dx,dy)<20){
  location.reload();
 }

 player.style.left=x+"px";
 player.style.top=y+"px";
 deer.style.left=deerX+"px";
 deer.style.top=deerY+"px";
 key.style.left=keyX+"px";
 key.style.top=keyY+"px";
 door.style.left=doorX+"px";
 door.style.top=doorY+"px";

 requestAnimationFrame(update);
}
update();
</script>

</body>
                        </html>

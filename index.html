<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETAPED</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

/* MENU */
#menu {
  position:absolute; width:100%; height:100%;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
}
button {
  padding:15px; margin:10px;
  background:red; color:white; border:none;
}

/* PANELS */
.panel {
  position:absolute; width:100%; height:100%;
  background:black; display:none;
  flex-direction:column; align-items:center; justify-content:center;
}

/* GAME */
#game { display:none; }

/* PLAYER & DEER */
.entity {
  width:20px; height:20px;
  position:absolute;
}
#player { background:red; }
#deer { background:white; }

/* MAZE */
.wall {
  position:absolute;
  background:#333;
}

/* UI */
#dialog {
  position:absolute;
  bottom:0; width:100%;
  background:rgba(0,0,0,0.7);
  padding:10px;
}

/* JOYSTICK */
#joyBase {
  position:absolute;
  bottom:30px; left:30px;
  width:100px; height:100px;
  border:2px solid red;
  border-radius:50%;
}
#joyStick {
  width:50px; height:50px;
  background:red;
  border-radius:50%;
  position:absolute;
  left:25px; top:25px;
}

/* BUTTON */
.btn {
  position:absolute;
  right:10px;
  background:red;
  padding:12px;
}
#run { bottom:120px; }
#crouch { bottom:60px; }

/* BAR */
.bar {
  width:150px; height:10px;
  border:1px solid white;
}
.fill { height:100%; width:0%; background:lime; }

</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>RETAPED</h1>
  <button onclick="openPanel('start')">PLAY</button>
  <button onclick="openPanel('settings')">SETTINGS</button>
  <button onclick="openPanel('credits')">CREDITS</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="panel">
  <h2>SETTINGS</h2>
  <p>Mic Sensitivity</p>
  <input type="range" min="1" max="3" value="2" id="sens">
  <button onclick="backMenu()">BACK</button>
</div>

<!-- CREDITS -->
<div id="credits" class="panel">
  <h2>CREDITS</h2>
  <p>Dev: You 😎</p>
  <p>Engine: HTML Chaos</p>
  <button onclick="backMenu()">BACK</button>
</div>

<!-- START -->
<div id="start" class="panel">
  <h2>SPAM UNTIL READY</h2>
  <div class="bar"><div id="startFill" class="fill"></div></div>
</div>

<!-- GAME -->
<div id="game">

<div id="player" class="entity"></div>
<div id="deer" class="entity"></div>

<div id="run" class="btn">RUN</div>
<div id="crouch" class="btn">CROUCH</div>

<div id="joyBase"><div id="joyStick"></div></div>

<div style="position:absolute;top:10px;">
VOICE<div class="bar"><div id="voiceBar" class="fill"></div></div>
SOUND<div class="bar"><div id="soundBar" class="fill"></div></div>
</div>

<div id="dialog">YOU: ...</div>

</div>

<script>
// PANEL CONTROL
function openPanel(id){
  menu.style.display="none";
  document.getElementById(id).style.display="flex";
}
function backMenu(){
  settings.style.display="none";
  credits.style.display="none";
  menu.style.display="flex";
}

// START BAR
let fill=0;
document.addEventListener("click",()=>{
  if(start.style.display==="flex") fill+=5;
});
setInterval(()=>{
  if(start.style.display!=="flex") return;
  fill-=1; fill=Math.max(0,Math.min(100,fill));
  startFill.style.width=fill+"%";

  if(fill>=100){
    start.style.display="none";
    game.style.display="block";
  }
},100);

// PLAYER
let x=50,y=50;
let sprint=false,crouch=false;
let keys={};

// BUTTON FIX
run.onmousedown=run.ontouchstart=()=>sprint=true;
run.onmouseup=run.ontouchend=()=>sprint=false;
crouch.onmousedown=crouch.ontouchstart=()=>crouch=true;
crouch.onmouseup=crouch.ontouchend=()=>crouch=false;

// KEYBOARD
document.onkeydown=e=>keys[e.key]=true;
document.onkeyup=e=>keys[e.key]=false;

// JOYSTICK
let joyX=0, joyY=0;
joyBase.ontouchmove=e=>{
 let r=joyBase.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+50);
 let dy=t.clientY-(r.top+50);
 let d=Math.min(40,Math.sqrt(dx*dx+dy*dy));
 let a=Math.atan2(dy,dx);
 joyX=Math.cos(a)*(d/40);
 joyY=Math.sin(a)*(d/40);
 joyStick.style.left=(25+joyX*25)+"px";
 joyStick.style.top=(25+joyY*25)+"px";
};
joyBase.ontouchend=()=>{joyX=0;joyY=0;};

// MAZE WALLS
let walls=[];
function createWall(x,y,w,h){
 let d=document.createElement("div");
 d.className="wall";
 d.style.left=x+"px";
 d.style.top=y+"px";
 d.style.width=w+"px";
 d.style.height=h+"px";
 game.appendChild(d);
 walls.push({x,y,w,h});
}
createWall(0,100,300,20);
createWall(200,200,20,200);
createWall(100,300,200,20);

// COLLISION
function collide(nx,ny){
 for(let w of walls){
  if(nx< w.x+w.w && nx+20> w.x &&
     ny< w.y+w.h && ny+20> w.y){
     return true;
  }
 }
 return false;
}

// AI + SOUND
let deerX=300,deerY=300;
let soundLevel=0, voiceLevel=0;

// VOICE DETECT
navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
 let ctx=new AudioContext();
 let mic=ctx.createMediaStreamSource(s);
 let a=ctx.createAnalyser();
 mic.connect(a);
 let data=new Uint8Array(a.frequencyBinCount);

 function loop(){
  a.getByteFrequencyData(data);
  let sum=0;
  for(let i of data) sum+=i;
  voiceLevel=sum/data.length;
  voiceBar.style.width=Math.min(100,voiceLevel)+"%";
  requestAnimationFrame(loop);
 }
 loop();
});

// UPDATE
function update(){
 let speed=2;
 if(sprint) speed=4;
 if(crouch) speed=1;

 let nx=x, ny=y;

 if(keys["w"]) ny-=speed;
 if(keys["s"]) ny+=speed;
 if(keys["a"]) nx-=speed;
 if(keys["d"]) nx+=speed;

 nx+=joyX*speed*2;
 ny+=joyY*speed*2;

 if(!collide(nx,ny)){ x=nx; y=ny; }

 // SOUND
 soundLevel = Math.abs(joyX)+Math.abs(joyY)*50;
 soundBar.style.width=Math.min(100,soundLevel)+"%";

 // AI REACT
 let noise = voiceLevel/2 + soundLevel;
 let dx=x-deerX, dy=y-deerY;
 let dist=Math.hypot(dx,dy);

 if(noise>50){
  deerX += dx*0.03;
  deerY += dy*0.03;
 }

 // KILL
 if(dist<20){
  dialog.innerText="YOU: NO...";
  setTimeout(()=>location.reload(),1500);
 }

 // DIALOG
 if(noise>60){
  dialog.innerText="NPC: I hear you...";
 } else {
  dialog.innerText="YOU: stay quiet...";
 }

 player.style.left=x+"px";
 player.style.top=y+"px";
 deer.style.left=deerX+"px";
 deer.style.top=deerY+"px";

 requestAnimationFrame(update);
}
update();
</script>

</body>
  </html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECRET ENDING</title>

<style>
body {
 margin:0;
 background:black;
 color:white;
 font-family:Arial;
 overflow:hidden;
 text-align:center;
}

/* SCENE */
#scene {
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

/* CHARACTER */
.char {
 width:40px;
 height:40px;
 margin:10px;
}

#you { background:red; }
#child { background:cyan; }
#teen { background:orange; }

/* MONITOR */
#monitor {
 width:120px;
 height:80px;
 background:lime;
 display:none;
}

/* TEXT */
#text {
 position:absolute;
 bottom:20px;
 width:100%;
 font-size:18px;
}

/* GLITCH */
.glitch {
 animation: glitch 0.2s infinite;
}

@keyframes glitch {
 0% { transform:translate(2px,2px); }
 50% { transform:translate(-2px,-2px); }
 100% { transform:translate(2px,-2px); }
}

/* FADE */
#fade {
 position:absolute;
 width:100%;
 height:100%;
 background:black;
 opacity:0;
 transition:1.5s;
}
</style>
</head>

<body>

<div id="scene">
  <div id="you" class="char"></div>
  <div id="child" class="char"></div>
  <div id="monitor"></div>
</div>

<div id="text">A peaceful past...</div>
<div id="fade"></div>

<script>

let stage = 0;

function nextScene(){

 // 0
 if(stage === 0){
  text.innerText = "You had a child...";
 }

 // 1
 if(stage === 1){
  text.innerText = "Time passed...";
 }

 // 2
 if(stage === 2){
  text.innerText = "Your child grew older.";
  child.style.display="none";

  let teen = document.createElement("div");
  teen.id="teen";
  teen.className="char";
  scene.appendChild(teen);
 }

 // 3
 if(stage === 3){
  text.innerText = "They started creating a 3D VR game...";
 }

 // 4
 if(stage === 4){
  text.innerText = "A virtual world... built from code.";
  monitor.style.display="block";
 }

 // 5
 if(stage === 5){
  text.innerText = "They tested it.";
 }

 // 6
 if(stage === 6){
  text.innerText = "Their community watched from the monitor.";
 }

 // 7
 if(stage === 7){
  text.innerText = "Everything seemed normal...";
 }

 // 8
 if(stage === 8){
  text.innerText = "Until...";
 }

 // 9 WARNING
 if(stage === 9){
  monitor.classList.add("glitch");
  text.innerText = "⚠ WARNING: HAS AN ASYNC ERROR";
 }

 // 10
 if(stage === 10){
  text.innerText = "The system began to fail...";
 }

 // 11
 if(stage === 11){
  text.innerText = "The VR world started glitching...";
 }

 // 12
 if(stage === 12){
  document.body.classList.add("glitch");
  text.innerText = "Something broke through...";
 }

 // 13
 if(stage === 13){
  text.innerText = "The world... was no longer contained.";
 }

 // 14
 if(stage === 14){
  fade.style.opacity=1;
  setTimeout(()=>{
    text.innerText = "It consumed everything...";
    fade.style.opacity=0;
  },1500);
 }

 // 15
 if(stage === 15){
  text.innerText = "Reality... and simulation merged.";
 }

 // 16 FINAL ERROR
 if(stage === 16){
  fade.style.opacity=1;
  setTimeout(()=>{
    text.innerText = "ERROR 404";
  },1000);
 }

 if(stage === 17){
  text.innerText = "THE PAGE WAS NOT FOUNDED";
 }

 if(stage === 18){
  text.innerText = "SECRET ENDING UNLOCKED";
 }

 stage++;
}

// AUTO PLAY
setInterval(nextScene, 3000);

</script>

</body>
</html>
